<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB Arrival Time</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>KMB Arrival Time</h1>
    <p>Please input route</p>
    <input type="text" onkeyup="rte_input_change();" id="rte_input" autocapitalize="characters" placeholder="Enter Route">
    <select required id="rte_options_select"><option value="" disabled>Select Direction</option></select>
    <input type="button" onclick="update();" value="Update">
    <div id="results"></div>
    <script>
      let route_data;
      setup();
      async function setup() {
        route_data = await local_storage_item("kmb_rte_data", "https://data.etabus.gov.hk/v1/transport/kmb/route/", 7, true);
      }
      function rte_input_change() {
        let rte_input = document.getElementById("rte_input").value;
        let rte_options = [];
        let rte_options_select = document.getElementById("rte_options_select");
        document.getElementById("rte_input").value = rte_input.toUpperCase();
        rte_options_select.innerHTML = "<option value='' disabled>Select Direction</option>";
        let rte_first = true;
        for (const rte_data of route_data["data"]) {
          if (rte_data["route"] == rte_input.toUpperCase()) {
            let rte_str = `${proper_stop_name(rte_data["orig_en"])[0]} to ${proper_stop_name(rte_data["dest_en"])[0]}`
            if (rte_data["service_type"] != 1) {
              rte_str += ` [Spec Dep ${rte_data["service_type"]}]`
            }
            rte_options_select.append(new Option(rte_str, `${rte_data["bound"]}${rte_data["service_type"]}`, false, rte_first));
            rte_first = false;
          }
        }
      }
      function proper_stop_name(name) {
        let title = name;
        let titleCase = title.replace(/\w\S*/g, (txt) => {
          return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
        });
        return [titleCase];
      }
      async function update() {
        try {
          const rte_options_select = document.getElementById("rte_options_select");
          const bound = rte_options_select.value[0];
          const service_type = rte_options_select.value[1];
          const route = document.getElementById("rte_input").value.toUpperCase();
          const eta_data = await (await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${route}/${service_type}`)).json();
          const stop_data_url = `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${route}/${bound == "I" ? "inbound" : "outbound"}/${service_type}`;
          const stop_data = await local_storage_item(`kmb_rte_stop_list/${route}/${bound}/${service_type}`, stop_data_url, 7);
          to_display(eta_data, stop_data, bound);
        } catch (error) {
          console.log(error);
        }
      }
      async function to_display(eta_data, stop_data, bound) {
        let results = "";
        for (const i of stop_data["data"]) {
          console.log(i);
        }
        
        let received_data = eta_data;
        let dir = bound;
        
        let stop_names = [];
        const fetchPromises = stop_data["data"].map(async (i) => {
          const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${i["stop"]}`);
          const received_data = await response.json();
          return { seq: Number(i["seq"]-1), name: received_data["data"]["name_tc"] };
        });
        const stop_name_results = await Promise.all(fetchPromises);
        stop_name_results.forEach(({ seq, name }) => {
          stop_names[seq] = name;
        });
        let teta_data = {
          "I": [],
          "O": []
        };
        for (const i of received_data["data"]) {
          if (!eta_data[i["dir"]][Number(i["seq"])-1]) {
            eta_data[i["dir"]][Number(i["seq"])-1] = [];
          }
          if (i["eta"]) {
            eta_data[i["dir"]][Number(i["seq"])-1].push([i["eta"], i["dest_tc"], i["rmk_tc"]]);
          }
        }
        for (let i = 0; i < stop_names.length; i++) {
          results += "<div onclick='expand(this);'>";
          results += `<p>${stop_names[i]}</p>`;
          results += "</div>";
          results += "<div style='display: none;'>";
          if (!eta_data[dir][i] || eta_data[dir][i].length == 0) {
            results += "No data at this stop";
          }
          results += "<table>";
          stop_eta_data = eta_data[dir][i];
          for (let k = 0; k < stop_eta_data.length; k++) {
            let eta_time = stop_eta_data[k][0];
            let eta_time_mins = time_difference_format(eta_time);
            if (i == 0 || i == stop_names.length - 1) {
              time_data = `<span class="bold_text">${eta_time_mins}</span> <span class="small_text">min</span>`;
            } else if (eta_time_mins < -0.5) {
              time_data = "<span class='bold_text'>Departed</span>";
            } else if (eta_time_mins < 0) {
              time_data = "<span class='bold_text'>Departing</span>";
            } else if (eta_time_mins < 0.5) {
              time_data = "<span class='bold_text'>Arriving</span>";
            } else {
              time_data = `<span class="bold_text">${eta_time_mins}</span> <span class="small_text">min</span>`;
            }
            results += "<tr>";
            results += `<td style="width: 140px">${time_show_format(eta_time)}</td>`;
            results += `<td style="width: 100px">${time_data}</td>`;
            results += `<td style="width: 80px"><span class='medium_text'>${stop_eta_data[k][2]}</span></td>`;
            results += "</tr>";
          }
          results += "</table>";
          results += "</div>";
        }
        document.getElementById("results").innerHTML = results;
      }
      function time_show_format(t) {
        return new Date(t).toTimeString().slice(0, 8);
      }
      function time_difference_format(t) {
        return Math.round((new Date(t) - new Date())/6000)/10;
      }
      function expand(elem) {
        if (elem.nextElementSibling.style.display == "none") {
          elem.nextElementSibling.style.display = "block";
        } else {
          elem.nextElementSibling.style.display = "none";
        }
      }
      async function local_storage_item(label, url, validity_period) {
        let data_dictionary = {};
        let return_data;
        if (localStorage.getItem("kmb_data_dictionary")) {
          data_dictionary = JSON.parse(localStorage.getItem("kmb_data_dictionary"));
        }
        if (data_dictionary[label] && localStorage.getItem(label) && (Date.now() - data_dictionary[label]) < (validity_period * 86400000)) {
          return_data = JSON.parse(localStorage.getItem(label));
        } else {
          return_data = await (await fetch(url)).json();
          localStorage.setItem(label, JSON.stringify(return_data));
          data_dictionary[label] = Date.now();
          localStorage.setItem("kmb_data_dictionary", JSON.stringify(data_dictionary))
        }
        return return_data;
      }
    </script>
  </body>
</html>
